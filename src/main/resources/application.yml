server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/product_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikaricp:
      max-pool-size: 20
      min-idle: 5
      connection-timeout: 30000

#  redis:
#    host: localhost
#    port: 6379
#    database: 0
#    timeout: 5000ms

  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 10s

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.xvxiang.productsalessystem.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: false

# 日志配置
logging:
  level:
    com.xvxiang.productsalessystem: debug
    org.mybatis: debug